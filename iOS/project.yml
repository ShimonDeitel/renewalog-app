name: Renewalog
options:
  bundleIdPrefix: com.shimondeitel.renewalog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Renewalog:
    type: application
    platform: iOS
    sources:
      - path: Renewalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.renewalog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Renewalog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RenewalogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RenewalogTests
      - path: Renewalog.storekit
    dependencies:
      - target: Renewalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.renewalog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RenewalogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RenewalogUITests
    dependencies:
      - target: Renewalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.renewalog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Renewalog:
    build:
      targets:
        Renewalog: all
        RenewalogTests: [test]
        RenewalogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Renewalog.storekit
    test:
      config: Debug
      storeKitConfiguration: Renewalog.storekit
      targets:
        - RenewalogTests
        - RenewalogUITests
    archive:
      config: Release
